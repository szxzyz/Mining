<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="46" stroke="url(#outerGlow)" stroke-width="1.5" opacity="0.4"/>
  <!-- Middle ring -->
  <circle cx="50" cy="50" r="38" stroke="url(#midGlow)" stroke-width="1" opacity="0.25"/>
  <!-- Core background -->
  <circle cx="50" cy="50" r="34" fill="url(#coreBg)"/>
  <!-- Circuit lines -->
  <path d="M50 16 L50 28" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 72 L50 84" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16 50 L28 50" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M72 50 L84 50" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M26 26 L34 34" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M66 66 L74 74" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M74 26 L66 34" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M26 74 L34 66" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Node dots at circuit ends -->
  <circle cx="28" cy="50" r="2" fill="#F5C542" opacity="0.7"/>
  <circle cx="72" cy="50" r="2" fill="#F5C542" opacity="0.7"/>
  <circle cx="50" cy="28" r="2" fill="#F5C542" opacity="0.7"/>
  <circle cx="50" cy="72" r="2" fill="#F5C542" opacity="0.7"/>
  <!-- Inner hexagon -->
  <polygon points="50,30 65,39.5 65,60.5 50,70 35,60.5 35,39.5" fill="url(#hexFill)" stroke="url(#hexStroke)" stroke-width="0.8"/>
  <!-- Energy bolt / AXN symbol -->
  <path d="M54 36 L44 50 L50 50 L46 64 L56 50 L50 50 Z" fill="url(#boltGrad)" filter="url(#glow)"/>
  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="coreBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="outerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C542"/>
      <stop offset="50%" stop-color="#e8a020"/>
      <stop offset="100%" stop-color="#F5C542"/>
    </linearGradient>
    <linearGradient id="midGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C542"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C542" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5C542" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C542" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C542" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#F5C542"/>
      <stop offset="100%" stop-color="#d4920a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
